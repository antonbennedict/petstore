services:
  # Backend: Spring Boot API
  - type: web
    name: petstore-backend
    env: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/petstore-0.0.1-SNAPSHOT.jar
    healthCheckPath: /lulu/pets
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: petstore-db
          property: jdbcConnectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JAVA_VERSION
        value: 17

  # Frontend: React (Vite) Static Site
  - type: web
    name: petstore-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API requests to the backend to avoid CORS and hardcoded URLs
      - type: rewrite
        source: /lulu/*
        destination: https://petstore-backend.onrender.com/lulu/*
      # Support for Single Page Application (SPA) routing
      - type: rewrite
        source: /*
        destination: /index.html

# Managed PostgreSQL Database
databases:
  - name: petstore-db
    plan: free
