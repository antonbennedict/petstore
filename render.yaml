services:
  # Backend: Spring Boot API (Dockerized)
  - type: web
    name: petstore-backend
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /lulu/pets
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: petstore-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: petstore-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: petstore-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: petstore-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  # Frontend: React (Vite) Static Site
  - type: web
    name: petstore-frontend
    runtime: static
    # Omitted 'plan' to resolve "no such plan free" for web-type services
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API requests to the backend
      - type: rewrite
        source: /lulu/*
        destination: https://petstore-backend.onrender.com/lulu/*
      # SPA routing
      - type: rewrite
        source: /*
        destination: /index.html

# Managed PostgreSQL Database
databases:
  - name: petstore-db
    plan: free
